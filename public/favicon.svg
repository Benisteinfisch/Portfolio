<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Passt sich dem Browser-/OS-Theme an: dunkle Tabs bekommen die helle Sage-Variante -->
  <style>
    .bg { fill: #4a6b4a; }
    .fg { fill: #F5F2EA; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #8db58d; }
      .fg { fill: #141412; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>
  <text class="fg" x="32" y="44" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="30" letter-spacing="-1">BA</text>
</svg>
