# Build-Check: fängt TypeScript-Fehler und kaputte Builds ab, BEVOR manuell
# per FTP zu All-Inkl deployt wird. Deployt bewusst NICHT (manueller Upload gewünscht).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
